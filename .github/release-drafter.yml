---
name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
tag-prefix: "v"
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'

categories:
  - type: "pre-exclude"
    when:
      label: "skip-changelog"
  - title: '🔥 Breaking Changes'
    semver-increment: "major"
    when:
      labels:
        - 'breaking'
        - 'major'
  - title: '🚀 Features'
    semver-increment: "minor"
    when:
      labels:
        - 'feature'
        - 'enhancement'
  - title: '🐛 Bug Fixes'
    when:
      labels:
        - 'bug'
        - 'fix'
  - title: '👋 Deprecated'
    when:
      label: 'deprecation'
  - title: '⛓  Dependency Updates'
    when:
      labels:
        - 'library-update'
        - 'dependencies'
  - title: '🛠  Internal Updates'
    when:
      labels:
        - 'internal'
        - 'kaizen'
        - 'test-library-update'
        - 'sbt-plugin-update'
        - 'chore'
  - title: '🔁 CI'
    when:
      label: 'ci'
  - title: '🧪 Tests'
    when:
      label: 'test'
  - title: '📚 Docs'
    when:
      label: 'documentation'
  - type: "version-resolver"
    semver-increment: "major"
    when:
      labels:
        - 'breaking'
        - 'major'
  - type: "version-resolver"
    semver-increment: "minor"
    when:
      labels:
        - 'feature'
        - 'enhancement'
  - type: "version-resolver"
    semver-increment: "patch"

autolabeler:
  - label: "documentation"
    files:
      - "README.md"
      - "docs/**"
      - ".github/instructions/**"
  - label: "dependencies"
    files:
      - "pom.xml"
      - "**/pom.xml"
      - ".github/dependabot.yaml"
    title:
      - "/^deps/i"
  - label: "ci"
    files:
      - ".github/workflows/**"
      - ".github/scripts/**"
  - label: "test"
    files:
      - "**/src/test/**"
      - "integration-tests/**"
  - label: "feature"
    branch:
      - "/feature\\/.+/"
    title:
      - "/^feat/i"
      - "/^feature/i"
  - label: "bug"
    branch:
      - "/fix\\/.+/"
    title:
      - "/^fix/i"
      - "/^bug/i"
  - label: "chore"
    branch:
      - "/chore\\/.+/"
    title:
      - "/^chore/i"

template: |
  ## What's Changed
  $CHANGES
  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
