---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "saturday"
      time: "07:00"
      timezone: "Asia/Tokyo"
    commit-message:
      prefix: "deps"
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "saturday"
      time: "07:00"
      timezone: "Asia/Tokyo"
    ignore:
      - dependency-name: "io.quarkus.platform:*"
        update-types: ["version-update:semver-minor"]
      - dependency-name: "io.quarkus:*"
        update-types: ["version-update:semver-minor"]
    groups:
      maven-plugin-dependencies:
        patterns:
          - "org.apache.maven.plugins*"
      quarkus-dependencies:
        patterns:
          - "io.quarkus:*"
          - "io.quarkus.platform:*"
          - "io.quarkus.*"
